services:
  stun_server:
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: stun_server
    cap_add:
      - NET_ADMIN
    networks:
      public:
        ipv6_address: fd00:face:cafe:1::2
    ports:
      - "8090:8090"
    environment:
      - CKB_CHAIN=dev
      - API_URL=http://127.0.0.1:8114
    command: [ "run" ]

  nat1_gateway:
    image: alpine:latest
    container_name: nat1_gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      nat1:
        aliases:
          - nat1_gateway
        ipv6_address: fd00:face:cafe:4::2
      public:
        aliases:
          - nat1_gateway
        ipv6_address: fd00:face:cafe:1::4
    command: >
      sh -c "
        apk add --no-cache iptables ip6tables iproute2 &&
        ip link show &&
        # eth0 (nat1) -> eth1 (public)
        iptables -t nat -A POSTROUTING -o eth1 -j MASQUERADE &&
        iptables -A FORWARD -i eth0 -o eth1 -j ACCEPT &&
        iptables -A FORWARD -i eth1 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT &&
        ip6tables -t nat -A POSTROUTING -o eth1 -j MASQUERADE &&
        ip6tables -A FORWARD -i eth0 -o eth1 -p udp -j ACCEPT &&
        ip6tables -A FORWARD -i eth0 -o eth1 -p icmpv6 -j ACCEPT &&
        ip6tables -A FORWARD -i eth1 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT &&
        ip6tables -A FORWARD -i eth1 -o eth0 -p icmpv6 -j ACCEPT &&
        tail -f /dev/null
      "
    depends_on:
      - stun_server

  peer1:
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: peer1
    cap_add:
      - NET_ADMIN
    networks:
      nat1:
        ipv6_address: fd00:face:cafe:4::3
    depends_on:
      - nat1_gateway
    environment:
      - CKB_CHAIN=dev
      - API_URL=http://127.0.0.1:8114
    command: ["run"]

  nat2_gateway:
    image: alpine:latest
    container_name: nat2_gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      nat2:
        aliases:
          - nat2_gateway
        ipv6_address: fd00:face:cafe:5::2
      public:
        aliases:
          - nat2_gateway
        ipv6_address: fd00:face:cafe:1::3
    command: >
      sh -c "
        apk add --no-cache iptables ip6tables iproute2 &&
        ip link show &&
        iptables -t nat -A POSTROUTING -o eth1 -j MASQUERADE &&
        iptables -A FORWARD -i eth0 -o eth1 -j ACCEPT &&
        iptables -A FORWARD -i eth1 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT &&
        ip6tables -t nat -A POSTROUTING -o eth1 -j MASQUERADE &&
        ip6tables -A FORWARD -i eth0 -o eth1 -p udp -j ACCEPT &&
        ip6tables -A FORWARD -i eth0 -o eth1 -p icmpv6 -j ACCEPT &&
        ip6tables -A FORWARD -i eth1 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT &&
        ip6tables -A FORWARD -i eth1 -o eth0 -p icmpv6 -j ACCEPT &&
        tail -f /dev/null
      "
    depends_on:
      - stun_server

  peer2:
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: peer2
    cap_add:
      - NET_ADMIN
    networks:
      nat2:
        ipv6_address: fd00:face:cafe:5::3
    depends_on:
      - nat2_gateway
    environment:
      - CKB_CHAIN=dev
      - API_URL=http://127.0.0.1:8114
    command: ["run"]

networks:
  nat1:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1
        - subnet: fd00:face:cafe:4::/64
          gateway: fd00:face:cafe:4::1
  nat2:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.22.0.0/16
          gateway: 172.22.0.1
        - subnet: fd00:face:cafe:5::/64
          gateway: fd00:face:cafe:5::1
  public:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
        - subnet: fd00:face:cafe:1::/64
          gateway: fd00:face:cafe:1::1
